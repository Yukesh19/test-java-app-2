apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-test-app-2-deployment
  labels:
    app: java-test-app-2

spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-test-app-2

  template:
    metadata:
      labels:
        app: java-test-app-2

    spec:
      containers:
        - name: java-test-app-2
          image: dockerhub-username/java-test-app-2:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8085

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: java-test-app-2-service

spec:
  type: NodePort
  selector:
    app: java-test-app-2

  ports:
    - protocol: TCP
      port: 80
      targetPort: 8085
      nodePort: 30007
